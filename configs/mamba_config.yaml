# Mamba Time Series Forecaster Config (Gu & Dao 2023)
model: mamba
# "engineered" = 50+ features (recommended)
# "raw"        = 11 raw variates
feature_mode: engineered

data:
  parquet_path: data/processed/wind_data.parquet
  features:
    - wind_speed
    - wind_direction
    - temperature
    - humidity
    - surface_pressure
  target_col: wind_speed

folds:
  - [2013-01-01, 2019-01-01, 2020-01-01]
  - [2013-01-01, 2020-01-01, 2021-01-01]
  - [2013-01-01, 2021-01-01, 2022-01-01]

horizons: [1, 6, 12, 24, 48]

model_params:
  seq_len:    336   # look-back window (hours)
  d_model:    64    # token embedding dimension
  d_state:    16    # SSM state dimension N (larger = more expressive)
  d_conv:     4     # local conv width inside Mamba block
  expand:     2     # inner expansion factor E
  n_layers:   4     # number of stacked Mamba blocks
  patch_size: 24    # patch size in hours (1 day per token)
  dropout:    0.1

training:
  epochs: 100
  batch_size: 256
  learning_rate: 1.0e-3
  weight_decay: 1.0e-1    # paper uses 0.1
  betas: [0.9, 0.95]      # paper recommendation
  patience: 15
  loss: mse
  optimizer: adamw
  lr_scheduler: cosine
  warmup_steps: 500
  device: cuda

output:
  metrics_path: results/metrics/mamba_results.csv
  model_dir:    results/models/mamba/
